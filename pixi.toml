[workspace]
authors = ["rdebrand <richard.hildebrandt@tum.de>"]
channels = ["conda-forge"]
name = "lego_fm_trafo"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"
preview = ["pixi-build"]

[tasks]
train = "python ./scripts/train.py"

[dependencies]
pytorch = ">=2.9.1,<3"
numpy = ">=2.3.5,<3"
matplotlib = ">=3.10.8,<4"

[pypi-dependencies]
flow-matching = ">=1.0.10, <2"
lightning = ">=2.5.6, <3"
schedulefree = ">=1.4.1, <2"
torch-linear-assignment = ">=0.0.5, <0.0.6"
x-transformers = ">=2.11.23, <3"
legofmt = { path = ".", editable = true }
