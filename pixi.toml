[workspace]
authors = ["rdebrand <richard.hildebrandt@tum.de>"]
channels = ["conda-forge"]
name = "legofmt"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"
exclude-newer = "14d"

[feature.base.dependencies]
python = ">=3.13.0,<3.15"
setuptools = "<82"
lightning = ">=2.5.6,<=2.6.1"

[feature.base.pypi-dependencies]
numpy = "*"
matplotlib = "*"
corner = "*"
schedulefree = ">=1.4.1"
pytorch-optimizer = "*"
flow-matching = ">=1.0.10"
legofmt = { path = ".", editable = true }

[feature.cuda.pypi-options]
no-build-isolation = ["torch-lap-cuda"]

[feature.cuda.system-requirements]
cuda = "13.0"

[feature.cuda.dependencies]
uv = "*"

[feature.cuda.target.linux-64.dependencies]
pytorch         = { version = ">=2.10", build = "cuda130_mkl*" }
torchvision     = { version = ">=0.26", build = "cuda130*" }
cuda-version    = "13.0.*"
cuda-nvcc       = "*"
cuda-cudart-dev = "*"
cuda-driver-dev = "*"
cuda-cccl       = "*"
libcublas-dev   = "*"
libcusparse-dev = "*"
libcusolver-dev = "*"

[feature.cuda.target.linux-64.tasks]
install-lap = "uv pip install --no-build-isolation git+https://github.com/rdebrand/torch-lap-cuda"

[feature.cpu.target.linux-64.dependencies]
torchvision = ">=0.26"

[feature.modern.pypi-dependencies]
x-transformers = "==2.18.8"

[feature.legacy.pypi-dependencies]
x-transformers = "==2.14.2"

[feature.train.dependencies]
comet-ml = "*"
uv = "*"

[feature.ci.dependencies]
pip = ">=25.3,<26"
pytest = "*"

[feature.ci.pypi-dependencies]
huggingface_hub = "*"
x-transformers = "==2.17.9"

[environments]
default = ["base", "cuda", "modern"]
default-osx = ["base", "modern"]
legacy = ["base", "cuda", "legacy"]
train = { features = ["base", "cuda", "modern", "train"], no-default-feature = true }
train-legacy = { features = ["base", "cuda", "legacy", "train"], no-default-feature = true }
ci = { features = ["base", "cpu", "ci"], no-default-feature = true }
