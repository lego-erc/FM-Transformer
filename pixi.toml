[workspace]
authors = ["rdebrand <richard.hildebrandt@tum.de>"]
channels = ["conda-forge", "pytorch", "nvidia"]
name = "lego_fm_trafo"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"
preview = ["pixi-build"]

[tasks]
train = "python ./scripts/train.py"

[dependencies]
gxx = ">=15.2.0,<15.3"
python = ">=3.14.0,<3.15"

[pypi-dependencies]
numpy = ">=2.3.5"
matplotlib = ">=3.10.7"
torch = ">=2.9.1"
flow-matching = ">=1.0.10"
lightning = ">=2.5.6"
schedulefree = ">=1.4.1"
torch-linear-assignment = ">=0.0.5"
x-transformers = ">=2.11.23"
legofmt = { path = ".", editable = true }
