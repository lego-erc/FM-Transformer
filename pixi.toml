[workspace]
authors = ["rdebrand <richard.hildebrandt@tum.de>"]
channels = ["conda-forge"]
name = "legofmt"
platforms = ["linux-64", "osx-arm64"]
version = "0.1.0"

[feature.base.dependencies]
python = ">=3.13.0,<3.15"
setuptools = "<82"
ipykernel = "*"

[feature.base.target.linux-64.dependencies]
numpy = "*"
matplotlib = "*"
corner = "*"

[feature.geant4.dependencies]
geant4 = "*"

[feature.geant4.target.linux-64.dependencies]
cuda-version = "13.*"
cuda-toolkit = "13.*"
geant4 = ">=11.3.2"

[feature.geant4.pypi-dependencies]
pyg4lego = { git = "https://github.com/lego-erc/pyg4lego.git", branch = "dep_fix"}

[feature.geant4.target.linux-64.activation.env]
CUDA_PATH = "$CONDA_PREFIX/targets/x86_64-linux"
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib"

[feature.geant4.target.osx-arm64.activation.env]
KMP_DUPLICATE_LIB_OK = "TRUE"

[feature.base.pypi-dependencies]
lightning = "*"
schedulefree = ">=1.4.1"
flow-matching = ">=1.0.10"
legofmt = { path = ".", editable = true }

[feature.base.target.linux-64.pypi-dependencies]
torch = { version = ">=2.11", index = "https://download.pytorch.org/whl/cu130" }
torchvision = { version = ">=0.20.1", index = "https://download.pytorch.org/whl/cu130" }

[feature.base.target.osx-arm64.pypi-dependencies]
torch = ">=2.11"
numpy = "*"
matplotlib = "*"
corner = "*"

[feature.modern.pypi-dependencies]
x-transformers = "==2.18.9"

[feature.legacy.pypi-dependencies]
x-transformers = "==2.14.2"

[feature.train.dependencies]
comet-ml = "*"
uv = "*"

[feature.train.activation]
scripts = ["scripts/train_setup.sh"]

[feature.ci.dependencies]
python = ">=3.13.0,<3.15"
setuptools = "<82"
pip = ">=25.3,<26"
pytest = "*"

[feature.ci.pypi-dependencies]
numpy = "*"
huggingface_hub = "*"
lightning = "*"
schedulefree = ">=1.4.1"
flow-matching = ">=1.0.10"
x-transformers = "==2.17.9"
legofmt = { path = ".", editable = true }

[feature.ci.target.linux-64.pypi-dependencies]
torch = { version = ">=2.11", index = "https://download.pytorch.org/whl/cpu" }
torchvision = { version = ">=0.20.1", index = "https://download.pytorch.org/whl/cpu" }

[feature.ci.target.osx-arm64.pypi-dependencies]
torch = ">=2.11"

[environments]
default = ["base", "modern"]
geant4 = ["base", "modern", "geant4"]
legacy = ["base", "legacy"]
legacy-geant4 = ["base", "legacy", "geant4"]
train = { features = ["base", "modern", "train"], no-default-feature = true }
train-legacy = { features = ["base", "legacy", "train"], no-default-feature = true }
train-geant4 = { features = ["base", "modern", "train", "geant4"], no-default-feature = true }
train-legacy-geant4 = { features = ["base", "legacy", "train", "geant4"], no-default-feature = true }
ci = { features = ["ci"], no-default-feature = true }
