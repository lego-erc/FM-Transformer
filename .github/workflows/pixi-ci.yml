name: Pixi CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      hf_repo:
        description: "HF repo id"
        default: "lego-erc/legofmt"
      hf_revision:
        default: "main"
      flow_ckpt:
        default: "checkpoints/fm/rp_fm_v4_100426.pt"
      mult_ckpt:
        default: "checkpoints/mult/rp_mult_v1_080426.pt"

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.9.4
        with:
          pixi-version: latest
          run-install: false

      - run: pixi install -e ci

      - name: Verify import
        run: pixi run -e ci python -c "import legofmt; print('ok')"

      - name: Cache HF hub
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-${{ inputs.hf_repo || 'lego-erc/legofmt' }}-${{ inputs.hf_revision || 'main' }}-${{ inputs.flow_ckpt || 'flow' }}-${{ inputs.mult_ckpt || 'mult' }}

      - name: Run generate tests
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_REPO: ${{ inputs.hf_repo || 'lego-erc/legofmt' }}
          HF_REVISION: ${{ inputs.hf_revision || 'main' }}
          HF_FLOW_CKPT: ${{ inputs.flow_ckpt || 'checkpoints/fm/rp_fm_v4_100426.pt' }}
          HF_MULT_CKPT: ${{ inputs.mult_ckpt || 'checkpoints/mult/rp_mult_v1_080426.pt' }}
        run: pixi run -e ci pytest tests/test_generate.py -v
