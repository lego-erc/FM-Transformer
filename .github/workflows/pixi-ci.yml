name: Pixi CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build and Install on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Pixi
      uses: prefix-dev/setup-pixi@v0.8.1
      with:
        pixi-version: latest
        # setup-pixi caches the environment but doesn't install it by default if cache exists.
        # We want to force install steps to verify 'pixi install' specifically.
        run-install: false

    - name: Pixi Install (CI Environment)
      run: pixi install -e ci

    - name: Verify Package Import
      run: pixi run -e ci python -c "import legofmt; print('Successfully imported legofmt')"
